openapi: 3.0.0
info:
  title: Social Service API
  description: Посты, лента новостей, лайки, группы.
  version: 1.0.0
servers:
  - url: http://social-service:8080
tags:
  - name: post
  - name: feed
  - name: like
  - name: group
paths:
  /posts:
    post:
      tags: [post]
      security: [ { bearerAuth: [] } ]
      summary: Создать пост
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, maxLength: 1000 }
                training_id: { type: string, format: uuid }
      responses:
        '201':
          description: Пост создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Некорректные данные
        '401':
          description: Не авторизован
    get:
      tags: [feed]
      security: [ { bearerAuth: [] } ]
      summary: Получить ленту новостей (посты друзей и групп)
      operationId: getFeed
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Массив постов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '401':
          description: Не авторизован
  /posts/{id}:
    get:
      tags: [post]
      security: [ { bearerAuth: [] } ]
      summary: Получить один пост
      operationId: getPost
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Пост
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Пост не найден
    delete:
      tags: [post]
      security: [ { bearerAuth: [] } ]
      summary: Удалить пост (свой или любой, если ADMIN роль)
      operationId: deletePost
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '204':
          description: Удалено
        '401':
          description: Не авторизован
        '403':
          description: Недостаточно прав
        '404':
          description: Пост не найден
  /posts/{id}/like:
    post:
      tags: [like]
      security: [ { bearerAuth: [] } ]
      summary: Поставить или убрать лайк (toggle)
      operationId: toggleLike
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Текущее состояние лайка
          content:
            application/json:
              schema:
                type: object
                properties:
                  liked: { type: boolean }
        '401':
          description: Не авторизован
        '404':
          description: Пост не найден
  /groups:
    post:
      tags: [group]
      security: [ { bearerAuth: [] } ]
      summary: Создать группу
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                type: { type: string, enum: [open, closed], default: open }
      responses:
        '201':
          description: Группа создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          description: Не авторизован
    get:
      tags: [group]
      security: [ { bearerAuth: [] } ]
      summary: Список групп, в которых состоит пользователь
      operationId: getMyGroups
      responses:
        '200':
          description: Массив групп
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Post:
      type: object
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        user_id: { type: string, format: uuid }
        user_name: { type: string }
        likes_count: { type: integer }
        created_at: { type: string, format: date-time }
    Group:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string }
        creator_id: { type: string, format: uuid }