openapi: 3.0.0
info:
  title: User Service API
  description: Управление пользователями, профилями, аутентификация.
  version: 1.0.0
servers:
  - url: http://user-service:8080
    description: Internal cluster
tags:
  - name: auth
    description: Регистрация и аутентификация
  - name: profile
    description: Управление профилем пользователя
paths:
  /users/register:
    post:
      tags: [auth]
      summary: Регистрация нового пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email, example: "user@example.com" }
                password: { type: string, minLength: 6, example: "securePass123" }
                name: { type: string, example: "John Doe" }
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Некорректные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Внутренняя ошибка сервера
  /users/login:
    post:
      tags: [auth]
      summary: Аутентификация пользователя
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: JWT access token }
        '401':
          description: Неверный email или пароль
  /users/me:
    get:
      tags: [profile]
      security: [ { bearerAuth: [] } ]
      summary: Получить полный профиль текущего пользователя
      operationId: getMyProfile
      responses:
        '200':
          description: Личный профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateProfile'
        '401':
          description: Не авторизован
    patch:
      tags: [profile]
      security: [ { bearerAuth: [] } ]
      summary: Частичное обновление профиля
      operationId: updateMyProfile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                weight: { type: number, example: 75.5 }
                goal: { type: string, enum: [lose_weight, maintain, gain_muscle] }
                name: { type: string }
      responses:
        '200':
          description: Обновлённый профиль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateProfile'
        '400':
          description: Ошибка валидации
        '401':
          description: Не авторизован
  /users/{userId}/public:
    get:
      tags: [profile]
      security: [ { bearerAuth: [] } ]
      summary: Получить публичный профиль другого пользователя
      operationId: getPublicProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Публичная информация пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfile'
        '404':
          description: Пользователь не найден
        '401':
          description: Не авторизован
  /users/batch:
    get:
      tags: [profile, internal]
      security: [ { internalAuth: [] } ]
      summary: Получить несколько публичных профилей по списку ID (внутренний вызов)
      operationId: getUsersBatch
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: array
            items: { type: string, format: uuid }
      responses:
        '200':
          description: "Объект, где ключ — userId, значение — PublicProfile"
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/PublicProfile'
        '400':
          description: Некорректный список ID
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalAuth:
      type: apiKey
      in: header
      name: X-Internal-Token
  schemas:
    PublicProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        avatar_url: { type: string }
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
    PrivateProfile:
      allOf:
        - $ref: '#/components/schemas/PublicProfile'
        - type: object
          properties:
            email: { type: string }
            weight: { type: number }
            goal: { type: string }
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }